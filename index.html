<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PIXEL RUSH · 像素冲击</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Canvas -->
<canvas id="c"></canvas>

<!-- Tutorial Overlay -->
<div id="tutorial" class="overlay">
  <div class="tutorial-content">
    <h1 class="tut-title">
      <span class="neon-green">PIXEL</span>
      <span class="neon-pink">RUSH</span>
    </h1>
    <p class="tut-subtitle">像素冲击 · 反应挑战</p>

    <div class="tut-rules">
      <div class="tut-rule">
        <div class="tut-icon-circle neon-green-border">
          <div class="tut-dot neon-green"></div>
        </div>
        <div class="tut-info">
          <div class="tut-name">TAP <span class="tut-en">点击</span></div>
          <div class="tut-desc">看到圆形就点击</div>
        </div>
      </div>

      <div class="tut-rule">
        <div class="tut-icon-circle neon-pink-border">
          <div class="tut-arrow tut-arrow-up neon-pink"></div>
        </div>
        <div class="tut-info">
          <div class="tut-name">↑ SWIPE <span class="tut-en">上滑</span></div>
          <div class="tut-desc">从下往上快速滑动</div>
        </div>
      </div>

      <div class="tut-rule">
        <div class="tut-icon-circle neon-blue-border">
          <div class="tut-arrow tut-arrow-down neon-blue"></div>
        </div>
        <div class="tut-info">
          <div class="tut-name">↓ SWIPE <span class="tut-en">下滑</span></div>
          <div class="tut-desc">从上往下滑动</div>
        </div>
      </div>

      <div class="tut-rule">
        <div class="tut-icon-circle neon-gold-border">
          <div class="tut-hold-ring neon-gold"></div>
        </div>
        <div class="tut-info">
          <div class="tut-name">HOLD <span class="tut-en">长按</span></div>
          <div class="tut-desc">按住直到外圈填满</div>
        </div>
      </div>

      <div class="tut-rule">
        <div class="tut-icon-circle neon-red-border">
          <div class="tut-double neon-red"></div>
        </div>
        <div class="tut-info">
          <div class="tut-name">2x TAP <span class="tut-en">双击</span></div>
          <div class="tut-desc">快速点两个圆圈</div>
        </div>
      </div>
    </div>

    <div class="tut-tip">
      <span class="tip-icon">💡</span>
      每 <span class="neon-yellow">8秒</span> 速度提升，失误扣
      <span class="neon-red">❤</span>，
      3条命用完游戏结束
    </div>

    <button id="startBtn" class="btn-start">我学会了，开始！</button>
    <button id="skipBtn" class="btn-skip">直接开始</button>
  </div>
</div>

<script src="audio.js"></script>
<script src="objects.js"></script>
<script src="game.js"></script>
</body>
</html>
