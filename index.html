<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PIXEL RUSH · 像素冲击</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<canvas id="c"></canvas>

<!-- Tutorial Overlay -->
<div id="tutorial" class="overlay">
  <div class="tutorial-content">
    <h1 class="tut-title">
      <span class="neon-green">PIXEL</span>
      <span class="neon-pink">RUSH</span>
    </h1>
    <p class="tut-subtitle">像素冲击 · 反应挑战</p>

    <div class="tut-rules">

      <!-- TAP -->
      <div class="tut-rule">
        <div class="tut-icon">
          <svg width="44" height="44" viewBox="0 0 44 44">
            <circle cx="22" cy="22" r="18" fill="none" stroke="#00ff88" stroke-width="2.5" style="filter:drop-shadow(0 0 6px #00ff88)"/>
            <circle cx="22" cy="22" r="7" fill="none" stroke="#00ff88" stroke-width="2"/>
            <rect x="19" y="19" width="6" height="6" fill="#00ff88"/>
          </svg>
        </div>
        <div class="tut-info">
          <div class="tut-name">TAP <span class="tut-en">点击</span></div>
          <div class="tut-desc">看到圆形就点击</div>
        </div>
      </div>

      <!-- SWIPE UP -->
      <div class="tut-rule">
        <div class="tut-icon">
          <svg width="44" height="44" viewBox="0 0 44 44">
            <rect x="19" y="14" width="6" height="20" fill="#ff00aa" style="filter:drop-shadow(0 0 4px #ff00aa)"/>
            <rect x="10" y="10" width="24" height="6" fill="#ff00aa"/>
            <rect x="13" y="16" width="18" height="5" fill="#ff00aa"/>
            <rect x="16" y="22" width="12" height="4" fill="#ff00aa"/>
            <circle cx="22" cy="22" r="18" fill="none" stroke="#ff00aa" stroke-width="1.5" opacity="0.35"/>
          </svg>
        </div>
        <div class="tut-info">
          <div class="tut-name">↑ SWIPE <span class="tut-en">上滑</span></div>
          <div class="tut-desc">从屏幕下方往上方快速滑动</div>
        </div>
      </div>

      <!-- SWIPE DOWN -->
      <div class="tut-rule">
        <div class="tut-icon">
          <svg width="44" height="44" viewBox="0 0 44 44">
            <rect x="19" y="10" width="6" height="20" fill="#00ddff" style="filter:drop-shadow(0 0 4px #00ddff)"/>
            <rect x="10" y="28" width="24" height="6" fill="#00ddff"/>
            <rect x="13" y="23" width="18" height="5" fill="#00ddff"/>
            <rect x="16" y="18" width="12" height="4" fill="#00ddff"/>
            <circle cx="22" cy="22" r="18" fill="none" stroke="#00ddff" stroke-width="1.5" opacity="0.35"/>
          </svg>
        </div>
        <div class="tut-info">
          <div class="tut-name">↓ SWIPE <span class="tut-en">下滑</span></div>
          <div class="tut-desc">从屏幕上方往下方快速滑动</div>
        </div>
      </div>

      <!-- HOLD -->
      <div class="tut-rule">
        <div class="tut-icon">
          <svg width="44" height="44" viewBox="0 0 44 44">
            <circle cx="22" cy="22" r="18" fill="none" stroke="#ffdd00" stroke-width="1.5" opacity="0.4" style="filter:drop-shadow(0 0 4px #ffdd00)"/>
            <circle cx="22" cy="22" r="18" fill="none" stroke="#ffdd00" stroke-width="2.5"
              stroke-dasharray="85 113"
              stroke-dashoffset="27"
              stroke-linecap="round"
              transform="rotate(-90 22 22)"
              style="filter:drop-shadow(0 0 4px #ffdd00)"/>
            <circle cx="22" cy="22" r="7" fill="rgba(255,221,0,0.3)" stroke="#ffdd00" stroke-width="2"/>
          </svg>
        </div>
        <div class="tut-info">
          <div class="tut-name">HOLD <span class="tut-en">长按</span></div>
          <div class="tut-desc">按住屏幕直到外圈填满</div>
        </div>
      </div>

      <!-- 2x TAP -->
      <div class="tut-rule">
        <div class="tut-icon">
          <svg width="52" height="44" viewBox="0 0 52 44">
            <circle cx="13" cy="22" r="11" fill="none" stroke="#ff4444" stroke-width="2.5" style="filter:drop-shadow(0 0 5px #ff4444)"/>
            <circle cx="13" cy="22" r="5" fill="#ff4444"/>
            <circle cx="39" cy="22" r="11" fill="none" stroke="#ff4444" stroke-width="2.5" style="filter:drop-shadow(0 0 5px #ff4444)"/>
            <circle cx="39" cy="22" r="5" fill="#ff4444"/>
          </svg>
        </div>
        <div class="tut-info">
          <div class="tut-name">2x TAP <span class="tut-en">双击</span></div>
          <div class="tut-desc">快速点两个圆圈</div>
        </div>
      </div>

    </div>

    <div class="tut-tip">
      <span class="tip-icon">💡</span>
      每 <span class="neon-gold">8秒</span> 速度提升，
      失误扣 <span class="neon-red">❤</span>，
      3条命用完游戏结束
    </div>

    <button id="startBtn" class="btn-start">我学会了，开始！</button>
    <button id="skipBtn" class="btn-skip">直接开始（已学会）</button>
  </div>
</div>

<script src="audio.js"></script>
<script src="objects.js"></script>
<script src="game.js"></script>
</body>
</html>
